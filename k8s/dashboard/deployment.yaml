apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: semantic-lb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: slb-dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_PROXY_URL
              value: "http://localhost:30080"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi

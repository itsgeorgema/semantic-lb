apiVersion: v1
kind: Service
metadata:
  name: proxy-svc
  namespace: semantic-lb
spec:
  type: NodePort
  selector:
    app: proxy
  ports:
    - name: proxy
      port: 8080
      targetPort: 8080
      nodePort: 30080
    - name: metrics
      port: 9090
      targetPort: 9090
      nodePort: 30090

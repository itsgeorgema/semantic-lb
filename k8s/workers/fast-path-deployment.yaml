apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-fast-path
  namespace: semantic-lb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-fast-path
  template:
    metadata:
      labels:
        app: worker-fast-path
    spec:
      containers:
        - name: worker
          image: slb-worker:latest
          imagePullPolicy: Never
          args: ["--type", "fast-path", "--port", "9003"]
          ports:
            - containerPort: 9003
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9003
            initialDelaySeconds: 5

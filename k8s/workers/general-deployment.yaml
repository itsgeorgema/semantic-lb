apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-general
  namespace: semantic-lb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-general
  template:
    metadata:
      labels:
        app: worker-general
    spec:
      containers:
        - name: worker
          image: slb-worker:latest
          imagePullPolicy: Never
          args: ["--type", "general", "--port", "9001"]
          ports:
            - containerPort: 9001
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 5

apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-high-compute
  namespace: semantic-lb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-high-compute
  template:
    metadata:
      labels:
        app: worker-high-compute
    spec:
      containers:
        - name: worker
          image: slb-worker:latest
          imagePullPolicy: Never
          args: ["--type", "high-compute", "--port", "9002"]
          ports:
            - containerPort: 9002
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9002
            initialDelaySeconds: 5
